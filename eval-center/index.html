      --bg: #11100d;
      --surface: #191814;
      --surface2: #211f1a;
      --surface3: #29251e;
      --border: #3a3428;
      --text: #eee9df;
      --muted: #aaa193;
      --subtle: #756d60;
      --accent: #ff7a1a;
      --teal: #2dd4bf;
      --green: #36d77b;
      --red: #ff4d4d;
      --yellow: #eab308;
      --blue: #60a5fa;

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); }
    body {

    .sidebar {

      position: sticky;
      top: 0;
      height: 100vh;
    }
    .brand { padding: 23px 18px 17px; border-bottom: 1px solid var(--border); }
    .brand-title { font-size: 15px; font-weight: 780; }

    .nav a.active { color: var(--text); background: var(--surface2); border-left-color: var(--accent); }

      height: 16px;

      place-items: center;
      font-size: 9px;
      flex: 0 0 16px;

    .mobile-bar { display: none; }
    .main { flex: 1; min-width: 0; padding: 32px; }
    .wrap { max-width: 1460px; margin: 0 auto; }
    .topline {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 24px;

    h1 { margin: 0; font-size: 22px; line-height: 1.25; font-weight: 780; }
    h2 { margin: 0; font-size: 18px; line-height: 1.3; }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      background: var(--surface2);
      padding: 8px 13px;
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
      cursor: pointer;

    .btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      font-weight: 760;
      margin: 0 0 12px;
    }
    .section-note { color: var(--muted); font-size: 12px; font-weight: 500; }
    .grid { display: grid; gap: 14px; }
    .metrics { grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); margin-bottom: 20px; }
    .cards4 { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
    .two-col { grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); }
    .three-col { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }

      border: 1px solid var(--border);
      border-radius: 8px;

    .panel { padding: 18px; }
    .card { padding: 16px; display: block; }
    .metric { padding: 17px 18px; min-height: 118px; }
    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      font-size: 14px;
      font-weight: 760;
    }
    .muted { color: var(--muted); }
    .subtle { color: var(--subtle); }
    .green { color: var(--green); }
    .red { color: var(--red); }
    .orange { color: var(--accent); }
    .yellow { color: var(--yellow); }
    .blue { color: var(--blue); }
    .teal { color: var(--teal); }
    .label { color: var(--muted); font-size: 11px; line-height: 1.45; }
    .big { font-size: 28px; font-weight: 780; margin-top: 9px; line-height: 1; }
    .unit { color: var(--muted); font-size: 12px; font-weight: 500; margin-left: 3px; }
    .hint { color: var(--muted); font-size: 11px; line-height: 1.5; margin-top: 8px; }
    .row-link {
      display: grid;
      grid-template-columns: 24px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 14px 0;
      border-top: 1px solid var(--border);

    .row-link:first-child { border-top: 0; padding-top: 2px; }

      width: 24px;
      height: 24px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2);
      display: grid;
      place-items: center;
      color: var(--accent);
      font-size: 12px;
      font-weight: 760;
    }
    .table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .table th {
      color: var(--muted);
      font-weight: 650;
      text-align: left;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
    }
    .table td {
      padding: 11px 10px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      line-height: 1.45;
    }
    .table tr:hover td { background: rgba(255,255,255,0.015); }

      display: inline-flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 7px;
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;

    .badge.running { color: var(--blue); border-color: rgba(96,165,250,0.35); }

    .track { height: 7px; border-radius: 4px; background: var(--surface2); overflow: hidden; }
    .fill { height: 100%; border-radius: 4px; background: var(--accent); }
    .back { color: var(--muted); font-size: 12px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 16px; }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

      background: var(--surface);
      color: var(--muted);
      border-radius: 5px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;

    .img-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(92px, 1fr)); gap: 8px; }

      border-radius: 8px;
      border: 1px solid var(--border);
      background:

      align-items: flex-end;
      padding: 8px;
      color: rgba(255,255,255,0.75);
      font-size: 11px;
      min-height: 92px;

    .tab {

      background: var(--surface);
      color: var(--muted);
      border-radius: 6px;
      padding: 7px 11px;
      font-size: 12px;
      cursor: pointer;
    }
    .tab.active { background: rgba(255,122,26,0.18); color: var(--text); border-color: rgba(255,122,26,0.55); }
    .kv {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 8px 12px;
      font-size: 12px;
      line-height: 1.45;
    }
    .kv span { color: var(--muted); }
    .code {
      border: 1px solid var(--border);
      background: #0d0c0a;
      border-radius: 8px;
      padding: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      color: var(--muted);
      white-space: pre-wrap;
      line-height: 1.55;
    }
    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      background: #0d0c0a;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 12px 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.35);
      font-size: 13px;
      max-width: 360px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity .18s, transform .18s;
      z-index: 50;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 40;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      width: min(720px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }
    .form-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin: 14px 0; }
    .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .field input, .field select, .field textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
    }
    .field.full { grid-column: 1 / -1; }
    .demo-ribbon {
      position: fixed;
      top: 12px;
      right: 14px;
      color: var(--muted);
      border: 1px solid var(--border);
      background: rgba(25,24,20,0.9);
      border-radius: 999px;
      padding: 5px 9px;
      font-size: 11px;
      z-index: 10;
    }
    @media (max-width: 980px) {
      .sidebar { display: none; }
      .app { display: block; }
      .mobile-bar {
        display: block;
        position: sticky;
        top: 0;
        z-index: 9;
        background: rgba(17,16,13,0.96);
        border-bottom: 1px solid var(--border);
        padding: 14px 16px 10px;
        backdrop-filter: blur(12px);
      }
      .mobile-brand { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
      .mobile-brand b { font-size: 16px; }
      .mobile-brand span { color: var(--muted); font-size: 11px; }
      .mobile-nav {
        display: flex;
        gap: 7px;
        overflow-x: auto;
        padding-bottom: 2px;
      }
      .mobile-nav a {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
        color: var(--muted);
        background: var(--surface);
        font-size: 12px;
      }
      .mobile-nav a.active {
        color: var(--text);
        border-color: rgba(255,122,26,0.55);
        background: rgba(255,122,26,0.16);
      }
      .main { padding: 22px 16px 80px; }
      .topline { flex-direction: column; }
      .actions { justify-content: flex-start; }
      .form-grid { grid-template-columns: 1fr; }
      .table-wrap { overflow-x: auto; }
    }
  </style>
</head>

        <section class="panel" style="margin-bottom:16px"><div class="panel-title">实验对比</div><table class="table"><thead><tr><th>实验</th><th>Outcome</th><th>Grounding</th><th>Listing</th><th>Top Failures</th></tr></thead><tbody>${data.runs.map(r=>`<tr><td><a class="orange" href="#/tasks/${r.id}"><b>${r.name}</b></a><div class="hint">${r.agent_version}</div></td><td class="${pctColor(r.pass_rate)}"><b>${r.pass_rate}%</b></td><td class="${pctColor(r.quality_score)}"><b>${r.quality_score}</b></td><td class="${pctColor(r.health_score)}"><b>${r.health_score}</b></td><td><span class="pill">image_repetition</span> <span class="pill">detail_filler</span></td></tr>`).join("")}</tbody></table></section>
        <div class="grid two-col"><section class="panel"><div class="panel-title">Root Cause Hotspots</div>${rootCounts.map(t=>`<div class="bar-row"><span>${t.code}</span><div class="track"><div class="fill" style="width:${Math.min(t.cases*22,100)}%"></div></div><b class="orange">${t.cases}</b></div>`).join("")}</section><section class="panel"><div class="panel-title">Failure Coding Queue</div><table class="table"><thead><tr><th>Case</th><th>实验</th><th>AI 推荐 Code</th><th>操作</th></tr></thead><tbody>${data.results.filter(r=>r.status!=="success").map(r=>`<tr><td>${caseById(r.case_id).title}<div class="hint">${r.summary}</div></td><td>${runById(r.run_id).name}</td><td>${r.issue_codes.map(c=>`<span class="pill">${c}</span>`).join(" ")}</td><td><a class="orange" href="#/tasks/${r.run_id}/results/${r.id}">诊断 →</a></td></tr>`).join("")}</tbody></table></section></div>
        <section class="panel" style="margin-top:16px"><div class="panel-title">Failure Taxonomy</div><table class="table"><thead><tr><th>Code</th><th>Category</th><th>Stage</th><th>Root Cause</th><th>Cases</th><th>Suggested Fix</th></tr></thead><tbody>${data.taxonomy.map(t=>`<tr><td><span class="pill">${t.code}</span></td><td>${t.category}</td><td>${t.stage}</td><td>${t.root}</td><td class="orange"><b>${t.cases}</b></td><td>${t.fix}</td></tr>`).join("")}</tbody></table></section>`;
    }

    function renderReports() {
      return `<div class="topline"><div><h1>值班报告</h1><div class="subtitle">每日自动评测汇总，AI 分析问题模式，每天 02:00 自动生成</div></div></div><div class="grid">${data.reports.map(r=>`<a class="panel" href="#/reports/${r.id}"><div class="panel-title"><span>值班报告 — ${r.report_date}</span><span class="${pctColor(r.health_score)}" style="font-size:26px">${r.health_score}</span></div><div class="grid cards4">${panelMetric("通过率", r.pass_rate + "%", pctColor(r.pass_rate))}${panelMetric("质量分", r.quality_score, pctColor(r.quality_score))}${panelMetric("FATAL 失败", r.fatal_failures, r.fatal_failures ? "red" : "green")}${panelMetric("WARNING 失败", r.warning_failures, r.warning_failures ? "orange" : "green")}</div><div class="hint" style="font-size:12px;line-height:1.7;margin-top:12px;border-top:1px solid var(--border);padding-top:10px">${r.ai_analysis.slice(0,220)}...</div></a>`).join("")}</div>`;
    }

    function renderReportDetail(id) {
      const r = reportById(id) || data.reports[0];
      const run = runById(r.run_id);
      const resultRows = data.results.filter(x => x.run_id === run.id);
      return `<a class="back" href="#/reports">‹ 返回报告列表</a><div class="topline"><div><h1>值班报告 — ${r.report_date}</h1><div class="subtitle">${run.name} · ${r.total_cases} 个用例 · ${run.platform}</div></div><div style="text-align:right"><div class="big ${pctColor(r.health_score)}" style="font-size:36px">${r.health_score}</div><div class="label">健康分/100</div></div></div><div class="grid cards4" style="margin-bottom:20px">${panelMetric("发布通过率", r.pass_rate + "%", pctColor(r.pass_rate))}${panelMetric("上架质量分", r.quality_score, pctColor(r.quality_score))}${panelMetric("FATAL 失败", r.fatal_failures, r.fatal_failures ? "red":"green")}${panelMetric("WARNING 失败", r.warning_failures, r.warning_failures ? "orange":"green")}</div><section class="panel" style="margin-bottom:20px"><div class="panel-title">AI 问题分析</div><div class="hint" style="font-size:13px;line-height:1.8">${r.ai_analysis}</div></section><section class="panel" style="margin-bottom:20px"><div class="panel-title">上架质量诊断</div>${bars([["图片质量", 68, "red"],["文案质量", 86, "green"],["事实一致性", 74, "yellow"],["转化表达", 81, "teal"]])}<table class="table" style="margin-top:14px"><thead><tr><th>Case</th><th>质量分</th><th>主要问题</th><th>操作</th></tr></thead><tbody>${resultRows.map(x=>`<tr><td>${caseById(x.case_id).title}</td><td class="${pctColor(x.listing)}"><b>${x.listing}</b></td><td>${x.summary}</td><td><a class="orange" href="#/tasks/${x.run_id}/results/${x.id}">查看 →</a></td></tr>`).join("")}</tbody></table></section><section class="panel"><div class="panel-title">各维度通过率</div><div class="grid three-col">${["main_image_quality","detail_page_quality","copy_conversion_quality","factual_accuracy","process_quality","title_appeal"].map((g,i)=>panelMetric(g, [62,70,86,78,84,82][i] + "%", pctColor([62,70,86,78,84,82][i]))).join("")}</div></section>`;
    }

    function renderNotFound() {
      return `<div class="panel"><h1>页面不存在</h1><div class="subtitle">这个静态 demo 没有对应路由。</div><button class="btn primary" data-route="/">回首页</button></div>`;
    }

    function render() {
      renderNav();
      const p = path();
      if (p !== lastRenderedPath) {
        modal.classList.remove("show");
        modal.innerHTML = "";
        lastRenderedPath = p;
      }
      let html = "";
      if (p === "/") html = renderHome();
      else if (p === "/datasets") html = renderDatasets();
      else if (p.startsWith("/datasets/")) html = renderDatasetDetail(p.split("/")[2]);
      else if (p === "/tasks") html = renderTasks();
      else if (/^\/tasks\/[^/]+\/results\/[^/]+$/.test(p)) { const [, , runId, , resultId] = p.split("/"); html = renderResultDetail(runId, resultId); }
      else if (p.startsWith("/tasks/")) html = renderTaskDetail(p.split("/")[2]);
      else if (p === "/analysis") html = renderAnalysis();
      else if (p === "/reports") html = renderReports();
      else if (p.startsWith("/reports/")) html = renderReportDetail(p.split("/")[2]);
      else html = renderNotFound();
      app.innerHTML = html;
      window.scrollTo(0, 0);
    }

    document.addEventListener("click", (event) => {
      const routeEl = event.target.closest("[data-route]");
      if (routeEl) { event.preventDefault(); route(routeEl.dataset.route); return; }
      const actionEl = event.target.closest("[data-demo-action]");
      if (actionEl) { event.preventDefault(); showToast("演示模式：这个操作不会写入数据库，但真实系统中会触发对应流程。"); return; }
      const modalEl = event.target.closest("[data-modal]");
      if (modalEl) {
        event.preventDefault();
        if (modalEl.dataset.modal === "dataset") showModal("创建数据集", `<div class="form-grid"><div class="field"><label>数据集名称</label><input value="图片质量专项回归集"></div><div class="field"><label>版本</label><input value="v1.0"></div><div class="field full"><label>描述</label><textarea>收录图片重复、主图证明力不足、详情页 filler 等 case。</textarea></div></div>`, "创建");
        if (modalEl.dataset.modal === "case") showModal("添加测试用例", `<div class="form-grid"><div class="field full"><label>1688 货源页 URL</label><input value="https://demo.1688.com/item/new-case"></div><div class="field"><label>品类</label><select><option>家居照明</option><option>厨房收纳</option></select></div><div class="field"><label>难度</label><select><option>hard</option><option>medium</option></select></div></div>`, "保存");
        if (modalEl.dataset.modal === "task") showModal("新建评测实验", `<div class="form-grid"><div class="field full"><label>实验名称</label><input value="Agent SDK 图片质量回归"></div><div class="field"><label>数据集</label><select><option>5月15日真实上架质量回归集</option></select></div><div class="field"><label>平台</label><select><option>全平台</option><option>淘宝</option></select></div><div class="field"><label>Agent 版本标记</label><input value="agent-sdk-vNext"></div></div>`, "启动实验");
        return;
      }
      if (event.target.closest("[data-close-modal]") || event.target === modal) { modal.classList.remove("show"); return; }
      const filter = event.target.closest("[data-filter]");
      if (filter) { state.filterStatus = filter.dataset.filter; render(); return; }
      const tab = event.target.closest("[data-result-tab]");
      if (tab) { state.resultTab = tab.dataset.resultTab; render(); return; }
    });

    window.addEventListener("hashchange", render);
    if (!location.hash) location.hash = "/";
    render();
  </script>
</body>
</html>
